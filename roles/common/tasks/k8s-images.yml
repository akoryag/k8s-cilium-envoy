---
- name: List required Kubernetes control plane images
  ansible.builtin.command:
    argv:
      - kubeadm
      - config
      - images
      - list
      - "--image-repository={{ k8s_image_repo }}"
      - "--kubernetes-version={{ k8s_version }}"
  register: _k8s_images_list
  changed_when: false

- name: Check which Kubernetes images are already present locally
  ansible.builtin.shell: |
    crictl inspecti "{{ item }}" >/dev/null 2>&1
  args:
    executable: /bin/bash
  loop: "{{ _k8s_images_list.stdout_lines }}"
  register: _k8s_images_check
  failed_when: false
  changed_when: false

- name: Determine missing Kubernetes images
  ansible.builtin.set_fact:
    _k8s_images_missing: "{{ _k8s_images_check.results | rejectattr('rc', 'equalto', 0) | map(attribute='item') | list }}"

- name: Pre-pull missing Kubernetes images
  ansible.builtin.command:
    argv:
      - ctr
      - -n
      - k8s.io
      - images
      - pull
      - "{{ item }}"
  loop: "{{ _k8s_images_missing }}"
  when: _k8s_images_missing | length > 0
  register: _k8s_images_pull
  until: _k8s_images_pull.rc == 0
  retries: 3
  delay: 10
  changed_when: false
