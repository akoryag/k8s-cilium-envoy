---
- name: OS prepare
  ansible.builtin.import_tasks: os-prepare.yml

- name: Configure keepalived for control-plane HA
  ansible.builtin.import_tasks: keepalived.yml
  when:
    - keepalived_enabled | bool
    - inventory_hostname in groups['master']

- name: Install Docker
  ansible.builtin.import_tasks: docker.yml

- name: Install Kubernetes
  ansible.builtin.import_tasks: k8s.yml

- name: Prepare OS for Longhorn
  ansible.builtin.import_tasks: longhorn-os.yml

- name: Pre-pull Kubernetes images on masters
  ansible.builtin.import_tasks: k8s-images.yml
  when: inventory_hostname in groups['master']

- name: Pre-pull Cilium images on all nodes
  ansible.builtin.import_tasks: cilium-images.yml

- name: Pre-pull Longhorn images on workers
  ansible.builtin.import_tasks: longhorn-images.yml
  when: inventory_hostname in groups['workers']
