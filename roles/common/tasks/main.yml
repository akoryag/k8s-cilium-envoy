---
- name: Disable swap for the current session
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Remove swap entry from fstab
  ansible.posix.mount:
    name: none
    fstype: swap
    state: absent

- name: Load kernel modules
  ansible.builtin.copy:
    content: |
      overlay
      br_netfilter
    dest: /etc/modules-load.d/k8s.conf
    mode: "0644"

- name: Enable kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Configure sysctl for Kubernetes
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - { key: net.ipv4.ip_forward, value: "1" }
    - { key: net.bridge.bridge-nf-call-iptables, value: "1" }
    - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }

- name: Limit journald log size
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: '^#?SystemMaxUse='
    line: 'SystemMaxUse=200M'
  notify: Restart journald

- name: Switch APT to Yandex mirrors (legacy sources.list)
  ansible.builtin.replace:
    path: /etc/apt/sources.list
    regexp: 'https?://([a-z]{2}\.)?(archive|security)\.ubuntu\.com/ubuntu/?'
    replace: 'http://{{ repo_mirror }}/ubuntu/'

- name: Switch APT to Yandex mirrors (DEB822 format)
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/ubuntu.sources
    regexp: '^URIs:\s*https?://([a-z]{2}\.)?(archive|security)\.ubuntu\.com/ubuntu/?'
    replace: 'URIs: http://{{ repo_mirror }}/ubuntu/'

- name: Install Docker
  ansible.builtin.import_tasks: docker.yml

- name: Install Kubernetes
  ansible.builtin.import_tasks: k8s.yml

- name: Apply pending service restarts before image pull
  ansible.builtin.meta: flush_handlers

- name: Prepare OS for Longhorn
  ansible.builtin.import_tasks: longhorn-os.yml

- name: Pre-pull Kubernetes images on masters
  ansible.builtin.import_tasks: k8s-images.yml
  when: inventory_hostname in groups['master']

- name: Pre-pull Cilium images on all nodes
  ansible.builtin.import_tasks: cilium-images.yml
