---
- name: Add Kubernetes GPG key
  ansible.builtin.apt_key:
    url: https://pkgs.k8s.io/core:/stable:/v{{ k8s_minor }}/deb/Release.key
    keyring: /usr/share/keyrings/kubernetes-keyring.gpg

- name: Add Kubernetes repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/usr/share/keyrings/kubernetes-keyring.gpg]
      https://{{ repo_mirror }}/mirrors/pkgs.k8s.io/core/stable/v{{ k8s_minor }}/deb/ /
    state: present
    update_cache: true

- name: Install Kubernetes packages
  ansible.builtin.apt:
    name:
      - kubelet={{ k8s_version }}-1.1
      - kubeadm={{ k8s_version }}-1.1
      - kubectl={{ k8s_version }}-1.1
      - cri-tools
    state: present
    update_cache: true

- name: Hold Kubernetes packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl
    - cri-tools

- name: Enable and start kubelet
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
    state: started

- name: Install Helm on control-plane nodes
  when: inventory_hostname in groups['master']
  block:
    - name: Check installed Helm version
      ansible.builtin.command:
        argv:
          - helm
          - version
          - --short
      register: _helm_version_check
      changed_when: false
      failed_when: false

    - name: Download and install Helm
      when: _helm_version_check.rc != 0 or ('v' + helm_version) not in _helm_version_check.stdout
      block:
        - name: Download Helm archive
          ansible.builtin.get_url:
            url: "https://get.helm.sh/helm-v{{ helm_version }}-linux-amd64.tar.gz"
            dest: "/tmp/helm-v{{ helm_version }}-linux-amd64.tar.gz"
            mode: "0644"

        - name: Extract Helm archive
          ansible.builtin.unarchive:
            src: "/tmp/helm-v{{ helm_version }}-linux-amd64.tar.gz"
            dest: /tmp
            remote_src: true

        - name: Install Helm binary
          ansible.builtin.copy:
            src: /tmp/linux-amd64/helm
            dest: /usr/local/bin/helm
            mode: "0755"
            remote_src: true

        - name: Remove Helm install artifacts
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - "/tmp/helm-v{{ helm_version }}-linux-amd64.tar.gz"
            - /tmp/linux-amd64

    - name: Check installed Helm diff plugin version
      ansible.builtin.command:
        argv:
          - helm
          - diff
          - version
      register: _helm_diff_version_check
      changed_when: false
      failed_when: false

    - name: Remove outdated Helm diff plugin
      when:
        - _helm_diff_version_check.rc == 0
        - helm_diff_version not in _helm_diff_version_check.stdout
      ansible.builtin.command:
        argv:
          - helm
          - plugin
          - uninstall
          - diff
      changed_when: true

    - name: Install Helm diff plugin
      when: _helm_diff_version_check.rc != 0 or helm_diff_version not in _helm_diff_version_check.stdout
      ansible.builtin.command:
        argv:
          - helm
          - plugin
          - install
          - https://github.com/databus23/helm-diff
          - --version
          - "v{{ helm_diff_version }}"
      register: _helm_diff_install
      failed_when:
        - _helm_diff_install.rc != 0
        - '"already exists" not in _helm_diff_install.stderr'
      changed_when: _helm_diff_install.rc == 0
