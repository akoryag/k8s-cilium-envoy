---
- name: Add Kubernetes GPG key
  apt_key:
    url: https://pkgs.k8s.io/core:/stable:/v{{ k8s_minor }}/deb/Release.key
    keyring: /usr/share/keyrings/kubernetes-keyring.gpg

- name: Add Kubernetes repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/kubernetes-keyring.gpg] https://{{ k8s_repo_mirror }}/mirrors/pkgs.k8s.io/core/stable/v{{ k8s_minor }}/deb/ /"
    state: present
    update_cache: yes

- name: Install Kubernetes packages
  apt:
    name:
      - "kubelet"
      - "kubeadm"
      - "kubectl"
    state: present
    update_cache: yes

- name: Hold Kubernetes packages
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl
