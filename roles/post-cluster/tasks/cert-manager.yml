---
- name: Add cert-manager helm repo
  kubernetes.core.helm_repository:
    name: jetstack
    repo_url: https://charts.jetstack.io
    kubeconfig: "{{ kubeconfig_path }}"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

- name: Install or upgrade cert-manager
  kubernetes.core.helm:
    name: cert-manager
    chart_ref: jetstack/cert-manager
    chart_version: "{{ cert_manager_version }}"
    release_namespace: "{{ cert_manager_namespace }}"
    create_namespace: true
    kubeconfig: "{{ kubeconfig_path }}"
    wait: false
    values: "{{ cert_manager_helm_values }}"
  delegate_to: "{{ groups['master'][0] }}"
  register: _cert_manager_helm
  until: _cert_manager_helm is succeeded
  retries: 3
  delay: 30
  run_once: true

- name: Wait for cert-manager rollout
  when: _cert_manager_helm is changed
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubeconfig_path }}"
      - -n
      - "{{ cert_manager_namespace }}"
      - rollout
      - status
      - deployment
      - "{{ item }}"
      - "--timeout={{ cert_manager_rollout_timeout }}"
  loop:
    - cert-manager
    - cert-manager-webhook
    - cert-manager-cainjector
  delegate_to: "{{ groups['master'][0] }}"
  changed_when: false
  run_once: true
