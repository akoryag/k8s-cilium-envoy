---
- name: Add Longhorn helm repo
  kubernetes.core.helm_repository:
    name: longhorn
    repo_url: https://charts.longhorn.io
    kubeconfig: "{{ kubeconfig_path }}"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

- name: Install or upgrade Longhorn
  kubernetes.core.helm:
    name: longhorn
    chart_ref: longhorn/longhorn
    chart_version: "{{ longhorn_version }}"
    release_namespace: "{{ longhorn_namespace }}"
    create_namespace: true
    kubeconfig: "{{ kubeconfig_path }}"
    wait: false
    values: "{{ longhorn_helm_values }}"
  delegate_to: "{{ groups['master'][0] }}"
  register: _longhorn_helm
  until: _longhorn_helm is succeeded
  retries: 3
  delay: 30
  run_once: true

- name: Wait for Longhorn rollout
  when: _longhorn_helm is changed
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubeconfig_path }}"
      - -n
      - "{{ longhorn_namespace }}"
      - rollout
      - status
      - daemonset
      - "{{ item }}"
      - "--timeout={{ longhorn_rollout_timeout }}"
  loop:
    - longhorn-manager
    - longhorn-csi-plugin
  delegate_to: "{{ groups['master'][0] }}"
  changed_when: false
  retries: 3
  delay: 30
  run_once: true

- name: Wait for Longhorn admission webhook endpoints
  ansible.builtin.shell: |
    kubectl --kubeconfig "{{ kubeconfig_path }}" \
      -n "{{ longhorn_namespace }}" \
      get endpoints longhorn-admission-webhook \
      -o jsonpath='{.subsets[0].addresses[0].ip}' | grep -q .
  args:
    executable: /bin/bash
  delegate_to: "{{ groups['master'][0] }}"
  register: _longhorn_webhook_wait
  until: _longhorn_webhook_wait.rc == 0
  retries: 60
  delay: 10
  changed_when: false
  run_once: true

- name: Ensure Longhorn manifest directory exists
  when: longhorn_trim_recurring_job_enabled | bool
  ansible.builtin.file:
    path: "{{ manifests_dir }}/longhorn"
    state: directory
    mode: "0755"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

- name: Render Longhorn filesystem-trim RecurringJob manifest
  when: longhorn_trim_recurring_job_enabled | bool
  ansible.builtin.template:
    src: longhorn-recurring-job-trim.yaml.j2
    dest: "{{ manifests_dir }}/longhorn/recurring-job-trim.yaml"
    mode: "0644"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

- name: Apply Longhorn filesystem-trim RecurringJob
  when: longhorn_trim_recurring_job_enabled | bool
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubeconfig_path }}"
      - apply
      - -f
      - "{{ manifests_dir }}/longhorn/recurring-job-trim.yaml"
  delegate_to: "{{ groups['master'][0] }}"
  register: _longhorn_trim_recurring_job
  until: _longhorn_trim_recurring_job.rc == 0
  retries: 5
  delay: 30
  changed_when: "'configured' in _longhorn_trim_recurring_job.stdout or 'created' in _longhorn_trim_recurring_job.stdout"
  run_once: true
