---
- name: Ensure Cilium manifest directory exists
  ansible.builtin.file:
    path: "{{ manifests_dir }}/cilium"
    state: directory
    mode: "0755"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

- name: Check if Cilium is already installed
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubeconfig_path }}"
      - -n
      - kube-system
      - get
      - ds
      - cilium
  register: _cilium_installed
  delegate_to: "{{ groups['master'][0] }}"
  failed_when: false
  changed_when: false
  run_once: true

- name: Delete kube-proxy DaemonSet before Cilium install
  when: _cilium_installed.rc != 0
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubeconfig_path }}"
      - -n
      - kube-system
      - delete
      - ds
      - kube-proxy
      - --ignore-not-found=true
  delegate_to: "{{ groups['master'][0] }}"
  changed_when: _init_delete_proxy.rc == 0
  register: _init_delete_proxy
  run_once: true

- name: Add Cilium helm repo
  kubernetes.core.helm_repository:
    name: cilium
    repo_url: https://helm.cilium.io/
    kubeconfig: "{{ kubeconfig_path }}"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

- name: Install or upgrade Cilium
  kubernetes.core.helm:
    name: cilium
    chart_ref: cilium/cilium
    chart_version: "{{ cilium_version }}"
    release_namespace: kube-system
    kubeconfig: "{{ kubeconfig_path }}"
    wait: false
    values: "{{ cilium_helm_values }}"
  delegate_to: "{{ groups['master'][0] }}"
  register: _cilium_helm
  until: _cilium_helm is succeeded
  retries: 3
  delay: 30
  run_once: true

- name: Wait for Cilium DaemonSet rollout
  when: _cilium_helm is changed
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubeconfig_path }}"
      - -n
      - kube-system
      - rollout
      - status
      - daemonset
      - cilium
      - "--timeout={{ cilium_rollout_timeout }}"
  delegate_to: "{{ groups['master'][0] }}"
  changed_when: false
  run_once: true

- name: wait for coreDNS to be ready
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubeconfig_path }}"
      - -n
      - kube-system
      - rollout
      - status
      - deployment
      - coredns
      - "--timeout={{ cilium_rollout_timeout }}"
  delegate_to: "{{ groups['master'][0] }}"
  retries: 3
  delay: 30
  run_once: true

- name: Render Cilium LoadBalancer IP pool manifest
  when: cilium_l2_announcements_enabled
  ansible.builtin.template:
    src: cilium-lb-ip-pool.yaml.j2
    dest: "{{ manifests_dir }}/cilium/cilium-lb-ip-pool.yaml"
    mode: "0644"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

- name: Apply Cilium LoadBalancer IP pool
  when: cilium_l2_announcements_enabled
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubeconfig_path }}"
      - apply
      - -f
      - "{{ manifests_dir }}/cilium/cilium-lb-ip-pool.yaml"
  delegate_to: "{{ groups['master'][0] }}"
  register: _cilium_lb_ip_pool
  changed_when: "'configured' in _cilium_lb_ip_pool.stdout or 'created' in _cilium_lb_ip_pool.stdout"
  run_once: true

- name: Render Cilium L2 announcement policy manifest
  when: cilium_l2_announcements_enabled
  ansible.builtin.template:
    src: cilium-l2-announcement-policy.yaml.j2
    dest: "{{ manifests_dir }}/cilium/cilium-l2-announcement-policy.yaml"
    mode: "0644"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

- name: Apply Cilium L2 announcement policy
  when: cilium_l2_announcements_enabled
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubeconfig_path }}"
      - apply
      - -f
      - "{{ manifests_dir }}/cilium/cilium-l2-announcement-policy.yaml"
  delegate_to: "{{ groups['master'][0] }}"
  register: _cilium_l2_policy
  changed_when: "'configured' in _cilium_l2_policy.stdout or 'created' in _cilium_l2_policy.stdout"
  run_once: true
