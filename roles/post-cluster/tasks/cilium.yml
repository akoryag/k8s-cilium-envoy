---
- name: Fetch kubeconfig
  ansible.builtin.fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ kubeconfig_local_path }}"
    flat: true
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

- name: Check if Cilium is already installed
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubeconfig_local_path }}"
      - -n
      - kube-system
      - get
      - ds
      - cilium
  register: _cilium_installed
  delegate_to: localhost
  failed_when: false
  changed_when: false
  run_once: true

- name: Add Cilium helm repo
  kubernetes.core.helm_repository:
    name: cilium
    repo_url: https://helm.cilium.io/
    kubeconfig: "{{ kubeconfig_local_path }}"
  delegate_to: localhost
  run_once: true

- name: Install or upgrade Cilium
  kubernetes.core.helm:
    name: cilium
    chart_ref: cilium/cilium
    chart_version: "{{ cilium_version }}"
    release_namespace: kube-system
    kubeconfig: "{{ kubeconfig_local_path }}"
    wait: false
    values: "{{ cilium_helm_values }}"
  delegate_to: localhost
  register: _cilium_helm
  until: _cilium_helm is succeeded
  retries: 3
  delay: 30
  run_once: true

- name: Wait for Cilium DaemonSet rollout
  when: _cilium_helm is changed
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubeconfig_local_path }}"
      - -n
      - kube-system
      - rollout
      - status
      - daemonset
      - cilium
      - "--timeout={{ cilium_rollout_timeout }}"
  delegate_to: localhost
  changed_when: false
  run_once: true

- name: Delete kube-proxy DaemonSet
  when: _cilium_installed.rc != 0
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubeconfig_local_path }}"
      - -n
      - kube-system
      - delete
      - ds
      - kube-proxy
  register: _init_delete_proxy
  delegate_to: localhost
  failed_when:
    - _init_delete_proxy.rc != 0
    - '"not found" not in _init_delete_proxy.stderr'
  changed_when: _init_delete_proxy.rc == 0
  run_once: true

- name: Render Cilium LoadBalancer IP pool manifest
  when: cilium_l2_announcements_enabled
  ansible.builtin.template:
    src: cilium-lb-ip-pool.yaml.j2
    dest: "{{ kubeconfig_local_path | dirname }}/cilium-lb-ip-pool.yaml"
    mode: "0644"
  delegate_to: localhost
  run_once: true

- name: Apply Cilium LoadBalancer IP pool
  when: cilium_l2_announcements_enabled
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubeconfig_local_path }}"
      - apply
      - -f
      - "{{ kubeconfig_local_path | dirname }}/cilium-lb-ip-pool.yaml"
  delegate_to: localhost
  register: _cilium_lb_ip_pool
  changed_when: "'configured' in _cilium_lb_ip_pool.stdout or 'created' in _cilium_lb_ip_pool.stdout"
  run_once: true

- name: Render Cilium L2 announcement policy manifest
  when: cilium_l2_announcements_enabled
  ansible.builtin.template:
    src: cilium-l2-announcement-policy.yaml.j2
    dest: "{{ kubeconfig_local_path | dirname }}/cilium-l2-announcement-policy.yaml"
    mode: "0644"
  delegate_to: localhost
  run_once: true

- name: Apply Cilium L2 announcement policy
  when: cilium_l2_announcements_enabled
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubeconfig_local_path }}"
      - apply
      - -f
      - "{{ kubeconfig_local_path | dirname }}/cilium-l2-announcement-policy.yaml"
  delegate_to: localhost
  register: _cilium_l2_policy
  changed_when: "'configured' in _cilium_l2_policy.stdout or 'created' in _cilium_l2_policy.stdout"
  run_once: true

- name: Remove rendered Cilium L2 manifests
  when: cilium_l2_announcements_enabled
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ kubeconfig_local_path | dirname }}/cilium-lb-ip-pool.yaml"
    - "{{ kubeconfig_local_path | dirname }}/cilium-l2-announcement-policy.yaml"
  delegate_to: localhost
  run_once: true

- name: Remove temporary kubeconfig
  ansible.builtin.file:
    path: "{{ kubeconfig_local_path }}"
    state: absent
  delegate_to: localhost
  run_once: true
