---
- name: Fetch kubeconfig
  ansible.builtin.fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ kubeconfig_local_path }}"
    flat: true
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

- name: Check if metrics-server is already installed
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubeconfig_local_path }}"
      - -n
      - kube-system
      - get
      - deployment
      - metrics-server
  register: _metrics_installed
  delegate_to: localhost
  failed_when: false
  changed_when: false
  run_once: true

- name: Add metrics-server helm repo
  when: _metrics_installed.rc != 0
  kubernetes.core.helm_repository:
    name: metrics-server
    repo_url: https://kubernetes-sigs.github.io/metrics-server/
    kubeconfig: "{{ kubeconfig_local_path }}"
  delegate_to: localhost
  run_once: true

- name: Install metrics-server
  when: _metrics_installed.rc != 0
  kubernetes.core.helm:
    name: metrics-server
    chart_ref: metrics-server/metrics-server
    release_namespace: kube-system
    kubeconfig: "{{ kubeconfig_local_path }}"
    values:
      image:
        repository: "{{ metrics_server_image_repo }}/metrics-server/metrics-server"
      args:
        - --kubelet-insecure-tls
  delegate_to: localhost
  register: _metrics_helm
  until: _metrics_helm is succeeded
  retries: 3
  delay: 30
  run_once: true

- name: Wait for metrics-server deployment
  when: _metrics_installed.rc != 0
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubeconfig_local_path }}"
      - -n
      - kube-system
      - rollout
      - status
      - deployment
      - metrics-server
      - --timeout=300s
  delegate_to: localhost
  changed_when: false
  run_once: true

- name: Remove temporary kubeconfig
  ansible.builtin.file:
    path: "{{ kubeconfig_local_path }}"
    state: absent
  delegate_to: localhost
  run_once: true
