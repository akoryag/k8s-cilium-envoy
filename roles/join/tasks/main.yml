---
- name: Get join command from first master
  ansible.builtin.command: kubeadm token create --print-join-command
  register: _join_cmd
  delegate_to: "{{ groups['master'][0] }}"
  changed_when: false
  run_once: true

- name: Join additional control-plane nodes
  when:
    - inventory_hostname in groups['master']
    - inventory_hostname != groups['master'][0]
  block:
    - name: Get certificate key
      ansible.builtin.command: kubeadm init phase upload-certs --upload-certs
      register: _join_cert_key
      delegate_to: "{{ groups['master'][0] }}"
      changed_when: false

    - name: Extract certificate key
      ansible.builtin.set_fact:
        _cert_key: "{{ _join_cert_key.stdout | regex_search('[a-f0-9]{64}') }}"

    - name: Validate certificate key
      ansible.builtin.assert:
        that:
          - _cert_key is not none
        fail_msg: "Failed to extract certificate key from kubeadm upload-certs output"

    - name: Join as control-plane
      ansible.builtin.command: >-
        {{ _join_cmd.stdout }}
        --control-plane
        --certificate-key {{ _cert_key }}
      register: _join_control_plane
      until: _join_control_plane.rc == 0
      retries: 3
      delay: 30
      args:
        creates: /etc/kubernetes/admin.conf

- name: Join worker nodes
  when: inventory_hostname in groups['workers']
  block:
    - name: Join as worker
      ansible.builtin.command: "{{ _join_cmd.stdout }}"
      register: _join_worker
      until: _join_worker.rc == 0
      retries: 3
      delay: 30
      args:
        creates: /etc/kubernetes/kubelet.conf
