apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy-config
  namespace: kube-system
data:
  haproxy.cfg: |
    global
        daemon
        maxconn 4096
        user root
        group root

    defaults
        mode tcp
        timeout connect 5000ms
        timeout client 50000ms
        timeout server 50000ms

    frontend http_redirect
        bind :80
        default_backend envoy_backend

    frontend https_redirect
        bind :443
        default_backend envoy_backend

    backend envoy_backend
        server envoy 127.0.0.1:8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lb-redirect
  namespace: kube-system
  labels:
    app: lb-redirect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lb-redirect
  template:
    metadata:
      labels:
        app: lb-redirect
    spec:
      hostNetwork: true
      nodeSelector:
        role: ingress
      terminationGracePeriodSeconds: 30
      containers:
      - name: haproxy
        image: haproxy:2.8-alpine
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          privileged: true
        ports:
        - name: http
          containerPort: 80
          hostPort: 80
          protocol: TCP
        - name: https
          containerPort: 443
          hostPort: 443
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /usr/local/etc/haproxy/haproxy.cfg
          subPath: haproxy.cfg
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: haproxy-config
          defaultMode: 0644